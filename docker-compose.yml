secrets:
  db_password:
    file: ./secrets/db_password.txt
  db_username:
    file: ./secrets/db_username.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt

services:
  mariadb:
    image: mariadb:11
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      MYSQL_ROOT_PASSWORD: /run/secrets/db_password
      MYSQL_DATABASE: course_registration
    volumes:
      - ./mariadb/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./mariadb/data.sql:/docker-entrypoint-initdb.d/02_data.sql
    secrets:
      - db_password
    networks:
      - internal

  adminer:
    image: adminer
    restart: always
    depends_on:
      - mariadb
    networks:
      - internal

  backend:
    build: ./courseregistration
    depends_on:
      mariadb:
        condition: service_healthy
    secrets:
      - db_password
      - db_username
      - jwt_secret
    environment:
      SPRING_DATASOURCE_URL: jdbc:mariadb://db:3306/course_registration
    networks:
      - internal

  nginx:
    image: nginx:alpine
    ports:
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/certs:/etc/nginx/certs
      - ./frontend:/usr/share/nginx/html
    depends_on:
      - backend
      - adminer
    networks:
      - internal

  frontend:

volumes:
  db_data:

networks:
  internal:
    driver: bridge