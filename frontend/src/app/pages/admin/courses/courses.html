<app-sidebar/>

<div class="sidebar-main">
  <div class="page-content">
    <div class="page-header">
      <div class="section-label">Management</div>
      <div class="flex justify-between items-center">
        <h1>Courses</h1>
        <button class="btn btn-primary" (click)="openModal()">+ New Course</button>
      </div>
    </div>

    <div class="flex gap-sm" style="margin-bottom:20px;">
      <input class="search-bar" placeholder="Search courses..." [(ngModel)]="search" (input)="filterCourses()"/>
    </div>

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Course</th>
            <th>Code</th>
            <th>Credits</th>
            <th>Department</th>
            <th>Prerequisites</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          @for (c of filtered; track c.courseId) {
            <tr>
              <td class="text-primary" style="font-weight:500;">{{ c.name }}</td>
              <td><span class="badge">{{ c.abbreviation }}</span></td>
              <td class="text-accent">{{ c.credits }} cr</td>
              <td>{{ c.departmentName }}</td>
              <td class="text-muted text-xs">{{ c.prerequisites.join(', ') || '—' }}</td>
              <td>
                <div class="flex gap-sm" style="justify-content:flex-end;">
                  <button class="btn btn-ghost" (click)="openModal(c)">Edit</button>
                  <button class="btn btn-danger" (click)="delete(c.courseId)">Delete</button>
                </div>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </div>
</div>

@if (modalOpen) {
  <div class="modal-overlay open">
    <div class="modal">
      <div class="modal-header">
        <h3>{{ editId ? 'Edit Course' : 'New Course' }}</h3>
        <button class="modal-close" (click)="closeModal()">✕</button>
      </div>
      <div class="flex flex-col gap-md">
        <div class="form-group">
          <label>Course Name</label>
          <input type="text" [(ngModel)]="form.name" placeholder="e.g. Data Structures"/>
        </div>
        <div class="form-group">
          <label>Abbreviation</label>
          <input type="text" [(ngModel)]="form.abbreviation" placeholder="e.g. COE 312"/>
        </div>
        <div class="flex gap-sm">
          <div class="form-group w-full">
            <label>Credits</label>
            <input type="number" [(ngModel)]="form.credits" placeholder="3"/>
          </div>
          <div class="form-group w-full">
            <label>Department ID</label>
            <input type="number" [(ngModel)]="form.departmentId" placeholder="1"/>
          </div>
        </div>
        <div class="flex gap-sm mt-sm" style="justify-content:flex-end;">
          <button class="btn btn-ghost" (click)="closeModal()">Cancel</button>
          <button class="btn btn-primary" (click)="save()">Save</button>
        </div>
      </div>
    </div>
  </div>
}
