<!-- shared/components/sidebar/sidebar.html -->
<aside class="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-logo">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#83C5BD" stroke-width="1.5">
                <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                <path d="M2 17l10 5 10-5"/>
                <path d="M2 12l10 5 10-5"/>
            </svg>
        </div>
        <div>
            <div class="sidebar-title">LAU Admin</div>
            <div class="sidebar-subtitle"></div>
        </div>
    </div>

    <nav class="sidebar-nav">
        @for (link of links; track link.path) {
            <a  [routerLink]="link.path"
                routerLinkActive="active"
                class="sidebar-link">
                {{ link.label }}
            </a>   
        }
    </nav>

    <div class="sidebar-footer">
        <button class="sidebar-logout" (click)="logout()">
            Sign Out
        </button>
    </div>
</aside>
