<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Enrollments · LAU</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/css/index.css"/>
</head>
<body>
<div id="toast" class="toast"></div>
<script src="/js/auth.js"></script>
<script>requireAuth('STUDENT');</script>

<nav>
  <div style="display:flex;align-items:center;gap:12px;">
    <div style="width:28px;height:28px;border-radius:50%;border:1.5px solid #1A786D;display:flex;align-items:center;justify-content:center;background:#1A786D15;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#83C5BD" stroke-width="1.5"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
    </div>
    <span style="color:#83C5BD;font-family:'DM Serif Display',serif;font-size:0.9rem;">LAU</span>
  </div>
  <div class="nav-links">
    <a href="/student/courses.html" class="nav-link">Courses</a>
    <a href="/student/enrollments.html" class="nav-link active">My Enrollments</a>
    <a href="/student/schedule.html" class="nav-link">Schedule</a>
  </div>
  <button onclick="logout()" style="background:none;border:1px solid #1A786D25;color:#2E8B80;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:0.8rem;transition:all 0.15s;"
    onmouseover="this.style.color='#ff8080';this.style.borderColor='#ff444430';"
    onmouseout="this.style.color='#2E8B80';this.style.borderColor='#1A786D25';">Sign Out</button>
</nav>

<div style="padding:32px 40px; max-width:900px; margin:0 auto;">
  <div class="page-header">
    <div class="section-label mb-1">Spring 2026</div>
    <h1 style="color:#D1EBE8;font-size:1.8rem;margin:0;">My Enrollments</h1>
    <p style="color:#2E8B80;font-size:0.85rem;margin-top:4px;">Your current course registrations</p>
  </div>

  <div id="enrollmentsList" style="display:flex;flex-direction:column;gap:14px;">
    <div style="color:#2E8B80;font-size:0.85rem;padding:32px;text-align:center;">Loading...</div>
  </div>
</div>

<script>
async function load() {
    try {
        const res = await apiFetch('/enrollment');
        const enrollments = res.data || [];
        const el = document.getElementById('enrollmentsList');

        if (!enrollments.length) {
            el.innerHTML = `
                <div style="text-align:center;padding:48px;border:1px dashed #1A786D30;border-radius:12px;">
                    <div style="color:#2E8B80;margin-bottom:12px;">No enrollments yet</div>
                    <a href="/student/courses.html" style="color:#62B1A8;font-size:0.85rem;text-decoration:none;border:1px solid #1A786D30;padding:8px 16px;border-radius:8px;">Browse Courses →</a>
                </div>`;
            return;
        }

        const active = enrollments.filter(e => e.status !== 'dropped');
        const dropped = enrollments.filter(e => e.status === 'dropped');

        let html = active.map(e => enrollmentCard(e)).join('');
        if (dropped.length) {
            html += `<div style="color:#2E8B80;font-size:0.75rem;text-transform:uppercase;letter-spacing:0.08em;margin-top:20px;margin-bottom:8px;">Dropped</div>`;
            html += dropped.map(e => enrollmentCard(e, true)).join('');
        }
        el.innerHTML = html;
    } catch(e) { showToast('Failed to load enrollments', 'error'); }
}

function statusBadge(status) {
    if (status === 'enrolled') return 'background:#1A786D30;color:#83C5BD;border:1px solid #1A786D50;';
    if (status === 'waitlisted') return 'background:#3F2A0020;color:#ffb347;border:1px solid #ffb34740;';
    return 'background:#3F000015;color:#ff8080;border:1px solid #ff444430;';
}

function enrollmentCard(e, faded = false) {
    return `
    <div class="enrollment-card" style="${faded ? 'opacity:0.5;' : ''}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;">
            <div>
                <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">
                    <span style="color:#D1EBE8;font-weight:500;font-size:1rem;">${e.courseName}</span>
                    <span style="font-size:0.7rem;padding:3px 10px;border-radius:20px;${statusBadge(e.status)}">${e.status}</span>
                </div>
                <div style="display:flex;gap:16px;font-size:0.8rem;color:#62B1A8;">
                    <span>${e.courseAbbreviation || ''}</span>
                    <span>CRN ${e.crn} · §${e.sectionNumber}</span>
                    <span>${e.professorName || ''}</span>
                </div>
            </div>
            ${e.status !== 'dropped' ? `
            <button class="btn btn-danger" onclick="drop(${e.crn})">Drop</button>` : ''}
        </div>
    </div>`;
}

async function drop(crn) {
    if (!confirm('Are you sure you want to drop this course?')) return;
    try {
        await apiFetch(`/enrollment/${crn}`, { method: 'DELETE' });
        showToast('Course dropped successfully');
        load();
    } catch(e) { showToast(e.message, 'error'); }
}

load();
</script>
</body>
</html>
