<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LAU Course Registration</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="/css/index.css"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
</head>
<body>
<div class="card rounded-2xl p-10 w-full max-w-md mx-4 fade-in">
  <div class="flex flex-col items-center mb-8">
    <div class="logo-ring mb-4">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#83C5BD" stroke-width="1.5">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
        <path d="M2 17l10 5 10-5"/>
        <path d="M2 12l10 5 10-5"/>
      </svg>
    </div>
    <h1 class="text-2xl text-white mb-1">LAU Registration</h1>
    <p class="text-sm" style="color:#62B1A8">Lebanese American University</p>
  </div>

  <div id="error" class="error-msg rounded-lg px-4 py-3 text-sm mb-5 hidden"></div>

  <form id="loginForm" class="flex flex-col gap-5">
    <div class="flex flex-col gap-2">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="your@lau.edu.lb"
        class="rounded-lg px-4 py-3 text-sm w-full"/>
    </div>
    <div class="flex flex-col gap-2">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••"
        class="rounded-lg px-4 py-3 text-sm w-full"/>
    </div>
    <button type="submit" class="btn-login rounded-lg py-3 font-medium text-sm mt-2">
      Sign In
    </button>
  </form>

  <hr class="divider mt-8 mb-4"/>
  <p class="text-center text-xs" style="color:#2E8B80">
    Course Registration System · Spring 2026
  </p>
</div>

<script>
  const token = localStorage.getItem('token');
  const role = localStorage.getItem('role');
  if (token && role === 'ADMIN') window.location.href = '/admin/dashboard.html';
  if (token && role === 'STUDENT') window.location.href = '/student/courses.html';

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const errorEl = document.getElementById('error');
    errorEl.classList.add('hidden');

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || 'Login failed');

      localStorage.setItem('token', data.data.token);
      localStorage.setItem('role', data.data.role);

      if (data.data.role === 'ADMIN') window.location.href = '/admin/dashboard.html';
      else window.location.href = '/student/courses.html';
    } catch (err) {
      errorEl.textContent = err.message;
      errorEl.classList.remove('hidden');
    }
  });
</script>
</body>
</html>
