<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Students · LAU Admin</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/css/index.css"/>
</head>
<body>
<div id="toast" class="toast"></div>
<script src="/js/auth.js"></script>
<script src="/js/sidebar.js"></script>
<script>
  requireAuth('ADMIN');
  renderSidebar('/admin/students.html');
</script>

<div style="padding:32px 40px; max-width:1100px;">
  <div class="page-header">
    <div class="section-label mb-1">Management</div>
    <h1 style="color:#D1EBE8;font-size:1.8rem;margin:0;">Students</h1>
  </div>

  <div style="margin-bottom:20px;">
    <input class="search-bar" type="text" placeholder="Search students..." id="searchInput" oninput="filterStudents()"/>
  </div>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>Student</th>
          <th>Email</th>
          <th>ID</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="studentsTable">
        <tr><td colspan="4" style="text-align:center;color:#2E8B80;padding:32px;">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Enrollments Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
      <h3 style="color:#D1EBE8;margin:0;font-size:1.1rem;" id="modalTitle">Student Enrollments</h3>
      <button onclick="closeModal()" style="background:none;border:none;color:#2E8B80;cursor:pointer;font-size:1.2rem;">✕</button>
    </div>
    <div id="enrollmentsList" style="display:flex;flex-direction:column;gap:10px;"></div>
  </div>
</div>

<script>
let allStudents = [];

async function load() {
    try {
        const res = await apiFetch('/admin/students');
        allStudents = res.data || [];
        renderTable(allStudents);
    } catch(e) { showToast('Failed to load students', 'error'); }
}

function initials(first, last) {
    return ((first?.[0] || '') + (last?.[0] || '')).toUpperCase();
}

function renderTable(students) {
    const tbody = document.getElementById('studentsTable');
    if (!students.length) {
        tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#2E8B80;padding:32px;">No students found</td></tr>';
        return;
    }
    tbody.innerHTML = students.map(s => `
        <tr>
            <td>
                <div style="display:flex;align-items:center;gap:12px;">
                    <div class="avatar">${initials(s.firstName, s.lastName)}</div>
                    <div style="color:#D1EBE8;font-weight:500;">${s.firstName} ${s.lastName}</div>
                </div>
            </td>
            <td style="color:#62B1A8;">${s.email}</td>
            <td><span style="color:#2E8B80;font-size:0.8rem;">#${s.studentId}</span></td>
            <td>
                <button class="btn btn-ghost" onclick="viewEnrollments(${s.studentId}, '${s.firstName} ${s.lastName}')">
                    View Enrollments
                </button>
            </td>
        </tr>`).join('');
}

function filterStudents() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    renderTable(allStudents.filter(s =>
        `${s.firstName} ${s.lastName}`.toLowerCase().includes(q) ||
        s.email.toLowerCase().includes(q)
    ));
}

async function viewEnrollments(id, name) {
    document.getElementById('modalTitle').textContent = `${name} — Enrollments`;
    document.getElementById('enrollmentsList').innerHTML = '<div style="color:#2E8B80;font-size:0.85rem;">Loading...</div>';
    document.getElementById('modal').classList.add('open');
    try {
        const res = await apiFetch(`/admin/students/${id}/enrollments`);
        const enrollments = res.data || [];
        const el = document.getElementById('enrollmentsList');
        if (!enrollments.length) {
            el.innerHTML = '<div style="color:#2E8B80;font-size:0.85rem;">No enrollments found</div>';
            return;
        }
        el.innerHTML = enrollments.map(e => `
            <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:#1A786D10;border-radius:8px;border:1px solid #1A786D20;">
                <div>
                    <div style="color:#D1EBE8;font-size:0.85rem;font-weight:500;">${e.courseName}</div>
                    <div style="color:#2E8B80;font-size:0.75rem;">CRN ${e.crn} · §${e.sectionNumber} · ${e.professorName || ''}</div>
                </div>
                <span style="font-size:0.7rem;padding:3px 10px;border-radius:20px;
                    ${e.status === 'enrolled' ? 'background:#1A786D30;color:#83C5BD;border:1px solid #1A786D50;' :
                      e.status === 'waitlisted' ? 'background:#3F2A0020;color:#ffb347;border:1px solid #ffb34740;' :
                      'background:#3F000015;color:#ff8080;border:1px solid #ff444430;'}">
                    ${e.status}
                </span>
            </div>`).join('');
    } catch(e) { showToast('Failed to load enrollments', 'error'); }
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }

load();
</script>
</body>
</html>
