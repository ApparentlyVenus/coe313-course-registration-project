<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dashboard · LAU Admin</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/css/index.css"/>
</head>
<body>
<div id="toast" class="toast"></div>
<script src="/js/auth.js"></script>
<script src="/js/sidebar.js"></script>
<script>
  requireAuth('ADMIN');
  renderSidebar('/admin/dashboard.html');
</script>

<div style="padding: 32px 40px; max-width: 1100px;">
  <div class="page-header">
    <div class="section-label mb-1">Overview</div>
    <h1 style="color:#D1EBE8; font-size:1.8rem; margin:0;">Dashboard</h1>
    <p style="color:#2E8B80; font-size:0.85rem; margin-top:4px;">Spring 2026 · Lebanese American University</p>
  </div>

  <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:32px;" id="statsGrid">
    <div class="stat-card">
      <div class="stat-icon mb-3">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#83C5BD" stroke-width="1.5"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
      </div>
      <div style="color:#62B1A8; font-size:1.8rem; font-weight:600;" id="statCourses">—</div>
      <div style="color:#2E8B80; font-size:0.8rem; margin-top:4px;">Total Courses</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon mb-3">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#83C5BD" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg>
      </div>
      <div style="color:#62B1A8; font-size:1.8rem; font-weight:600;" id="statSections">—</div>
      <div style="color:#2E8B80; font-size:0.8rem; margin-top:4px;">Active Sections</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon mb-3">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#83C5BD" stroke-width="1.5"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
      </div>
      <div style="color:#62B1A8; font-size:1.8rem; font-weight:600;" id="statStudents">—</div>
      <div style="color:#2E8B80; font-size:0.8rem; margin-top:4px;">Students</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon mb-3">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#83C5BD" stroke-width="1.5"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      </div>
      <div style="color:#62B1A8; font-size:1.8rem; font-weight:600;" id="statEnrollments">—</div>
      <div style="color:#2E8B80; font-size:0.8rem; margin-top:4px;">Enrollments</div>
    </div>
  </div>

  <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
    <div style="background:linear-gradient(145deg,#001B18,#000908);border:1px solid #1A786D25;border-radius:12px;padding:24px;">
      <h3 style="color:#83C5BD;font-size:1rem;margin:0 0 16px;">Recent Enrollments</h3>
      <div id="recentEnrollments" style="display:flex;flex-direction:column;gap:10px;">
        <div style="color:#2E8B80;font-size:0.85rem;">Loading...</div>
      </div>
    </div>
    <div style="background:linear-gradient(145deg,#001B18,#000908);border:1px solid #1A786D25;border-radius:12px;padding:24px;">
      <h3 style="color:#83C5BD;font-size:1rem;margin:0 0 16px;">Quick Actions</h3>
      <div style="display:flex;flex-direction:column;gap:10px;">
        <a href="/admin/courses.html" style="display:flex;align-items:center;gap:10px;padding:12px;border-radius:8px;background:#1A786D15;border:1px solid #1A786D30;color:#83C5BD;text-decoration:none;font-size:0.85rem;transition:all 0.15s;"
          onmouseover="this.style.background='#1A786D25'" onmouseout="this.style.background='#1A786D15'">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add New Course
        </a>
        <a href="/admin/sections.html" style="display:flex;align-items:center;gap:10px;padding:12px;border-radius:8px;background:#1A786D15;border:1px solid #1A786D30;color:#83C5BD;text-decoration:none;font-size:0.85rem;transition:all 0.15s;"
          onmouseover="this.style.background='#1A786D25'" onmouseout="this.style.background='#1A786D15'">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add New Section
        </a>
        <a href="/admin/enrollments.html" style="display:flex;align-items:center;gap:10px;padding:12px;border-radius:8px;background:#1A786D15;border:1px solid #1A786D30;color:#83C5BD;text-decoration:none;font-size:0.85rem;transition:all 0.15s;"
          onmouseover="this.style.background='#1A786D25'" onmouseout="this.style.background='#1A786D15'">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
          Manage Enrollments
        </a>
        <a href="/admin/students.html" style="display:flex;align-items:center;gap:10px;padding:12px;border-radius:8px;background:#1A786D15;border:1px solid #1A786D30;color:#83C5BD;text-decoration:none;font-size:0.85rem;transition:all 0.15s;"
          onmouseover="this.style.background='#1A786D25'" onmouseout="this.style.background='#1A786D15'">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
          View All Students
        </a>
      </div>
    </div>
  </div>
</div>

<script>
async function loadStats() {
    try {
        const [courses, sections, students, enrollments] = await Promise.all([
            apiFetch('/admin/courses'),
            apiFetch('/admin/sections'),
            apiFetch('/admin/students'),
            apiFetch('/admin/enrollments')
        ]);
        document.getElementById('statCourses').textContent = courses.data?.length ?? 0;
        document.getElementById('statSections').textContent = sections.data?.length ?? 0;
        document.getElementById('statStudents').textContent = students.data?.length ?? 0;
        document.getElementById('statEnrollments').textContent = enrollments.data?.length ?? 0;

        const recent = (enrollments.data || []).slice(0, 5);
        const el = document.getElementById('recentEnrollments');
        if (recent.length === 0) {
            el.innerHTML = '<div style="color:#2E8B80;font-size:0.85rem;">No enrollments yet</div>';
        } else {
            el.innerHTML = recent.map(e => `
                <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:#1A786D10;border-radius:8px;border:1px solid #1A786D20;">
                    <div>
                        <div style="color:#D1EBE8;font-size:0.85rem;">${e.courseName}</div>
                        <div style="color:#2E8B80;font-size:0.75rem;">${e.professorName || ''}</div>
                    </div>
                    <span style="font-size:0.7rem;padding:3px 8px;border-radius:20px;
                        ${e.status === 'enrolled' ? 'background:#1A786D30;color:#83C5BD;border:1px solid #1A786D50;' :
                          e.status === 'waitlisted' ? 'background:#3F2A0020;color:#ffb347;border:1px solid #ffb34740;' :
                          'background:#3F000015;color:#ff8080;border:1px solid #ff444430;'}">
                        ${e.status}
                    </span>
                </div>`).join('');
        }
    } catch(err) {
        showToast('Failed to load stats', 'error');
    }
}
loadStats();
</script>
</body>
</html>
