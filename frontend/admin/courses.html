<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Courses · LAU Admin</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/css/index.css"/>
</head>
<body>
<div id="toast" class="toast"></div>
<script src="/js/auth.js"></script>
<script src="/js/sidebar.js"></script>
<script>
  requireAuth('ADMIN');
  renderSidebar('/admin/courses.html');
</script>

<div style="padding:32px 40px; max-width:1100px;">
  <div class="page-header">
    <div class="section-label mb-1">Management</div>
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <h1 style="color:#D1EBE8;font-size:1.8rem;margin:0;">Courses</h1>
      <button class="btn btn-primary" onclick="openModal()">+ New Course</button>
    </div>
  </div>

  <div style="display:flex;gap:12px;margin-bottom:20px;align-items:center;">
    <input class="search-bar" type="text" placeholder="Search courses..." id="searchInput" oninput="filterCourses()"/>
  </div>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>Course</th>
          <th>Code</th>
          <th>Credits</th>
          <th>Department</th>
          <th>Prerequisites</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="coursesTable">
        <tr><td colspan="6" style="text-align:center;color:#2E8B80;padding:32px;">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
      <h3 style="color:#D1EBE8;margin:0;font-size:1.1rem;" id="modalTitle">New Course</h3>
      <button onclick="closeModal()" style="background:none;border:none;color:#2E8B80;cursor:pointer;font-size:1.2rem;">✕</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:14px;">
      <input type="hidden" id="editId"/>
      <div><label>Course Name</label><input type="text" id="fieldName" placeholder="e.g. Data Structures"/></div>
      <div><label>Abbreviation</label><input type="text" id="fieldAbbr" placeholder="e.g. COE 312"/></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div><label>Credits</label><input type="number" id="fieldCredits" placeholder="3" min="1" max="6"/></div>
        <div><label>Department</label>
          <select id="fieldDept">
            <option value="">Select...</option>
          </select>
        </div>
      </div>
      <div style="display:flex;gap:10px;margin-top:8px;justify-content:flex-end;">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveCourse()">Save Course</button>
      </div>
    </div>
  </div>
</div>

<script>
let allCourses = [];
let departments = [];

async function load() {
    try {
        const [cRes, dRes] = await Promise.all([
            apiFetch('/admin/courses'),
            apiFetch('/admin/courses') // departments endpoint if exists, else skip
        ]);
        allCourses = cRes.data || [];
        renderTable(allCourses);
    } catch(e) { showToast('Failed to load courses', 'error'); }
}

function renderTable(courses) {
    const tbody = document.getElementById('coursesTable');
    if (!courses.length) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#2E8B80;padding:32px;">No courses found</td></tr>';
        return;
    }
    tbody.innerHTML = courses.map(c => `
        <tr>
            <td style="color:#D1EBE8;font-weight:500;">${c.name}</td>
            <td><span class="badge">${c.abbreviation}</span></td>
            <td style="color:#62B1A8;">${c.credits} cr</td>
            <td>${c.departmentName || '—'}</td>
            <td style="color:#2E8B80;font-size:0.78rem;">${(c.prerequisites || []).join(', ') || '—'}</td>
            <td>
                <div style="display:flex;gap:8px;justify-content:flex-end;">
                    <button class="btn btn-ghost" onclick="editCourse(${c.courseID})">Edit</button>
                    <button class="btn btn-danger" onclick="deleteCourse(${c.courseID})">Delete</button>
                </div>
            </td>
        </tr>`).join('');
}

function filterCourses() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    renderTable(allCourses.filter(c =>
        c.name.toLowerCase().includes(q) || c.abbreviation.toLowerCase().includes(q)
    ));
}

function openModal(course = null) {
    document.getElementById('editId').value = course ? course.courseID : '';
    document.getElementById('modalTitle').textContent = course ? 'Edit Course' : 'New Course';
    document.getElementById('fieldName').value = course?.name || '';
    document.getElementById('fieldAbbr').value = course?.abbreviation || '';
    document.getElementById('fieldCredits').value = course?.credits || '';
    document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }

function editCourse(id) {
    const c = allCourses.find(c => c.courseID === id);
    if (c) openModal(c);
}

async function saveCourse() {
    const id = document.getElementById('editId').value;
    const body = {
        name: document.getElementById('fieldName').value,
        abbreviation: document.getElementById('fieldAbbr').value,
        credits: parseInt(document.getElementById('fieldCredits').value),
        prerequisiteIds: []
    };
    try {
        if (id) await apiFetch(`/admin/courses/${id}`, { method: 'PUT', body: JSON.stringify(body) });
        else await apiFetch('/admin/courses', { method: 'POST', body: JSON.stringify(body) });
        showToast(id ? 'Course updated' : 'Course created');
        closeModal();
        load();
    } catch(e) { showToast(e.message, 'error'); }
}

async function deleteCourse(id) {
    if (!confirm('Delete this course?')) return;
    try {
        await apiFetch(`/admin/courses/${id}`, { method: 'DELETE' });
        showToast('Course deleted');
        load();
    } catch(e) { showToast(e.message, 'error'); }
}

load();
</script>
</body>
</html>
